<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Human Hacking — Interactive Cybersecurity Awareness Training"
    />
    <title>Human Hacking</title>
    <style>
      :root {
        --bg0: #04060a;
        --bg1: #060a12;
        --panel: rgba(3, 8, 14, 0.86);
        --text: #d9ffe9;
        --muted: rgba(217, 255, 233, 0.68);

        --neon: #00ff9c;
        --border: rgba(0, 255, 156, 0.55);
        --borderSoft: rgba(0, 255, 156, 0.22);
        --shadow: rgba(0, 0, 0, 0.75);

        --font: ui-monospace, "Cascadia Mono", "SFMono-Regular", Menlo, Consolas,
          "Liberation Mono", "Courier New", monospace;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        color: var(--text);
        font-family: var(--font);
        background:
          radial-gradient(circle at 10% 0%, rgba(0, 255, 156, 0.14), transparent 52%),
          radial-gradient(circle at 90% 100%, rgba(123, 247, 255, 0.12), transparent 55%),
          linear-gradient(180deg, var(--bg1), var(--bg0));
        overflow: hidden;
      }

      .scanlines {
        pointer-events: none;
        position: fixed;
        inset: 0;
        opacity: 0.22;
        background-image: linear-gradient(rgba(255, 255, 255, 0.028) 1px, transparent 1px);
        background-size: 100% 3px;
        mix-blend-mode: overlay;
      }

      .wrap {
        min-height: 100%;
        display: grid;
        place-items: center;
        padding: 26px;
      }

      .panel {
        width: min(860px, 100%);
        border-radius: 18px;
        border: 1px solid var(--borderSoft);
        background:
          radial-gradient(circle at 14% 0%, rgba(123, 247, 255, 0.09), transparent 48%),
          radial-gradient(circle at 88% 90%, rgba(0, 255, 156, 0.1), transparent 58%),
          var(--panel);
        box-shadow: 0 22px 70px var(--shadow);
        padding: clamp(22px, 4vw, 44px);
        text-align: center;
        position: relative;
        overflow: hidden;
      }

      .panel::before {
        content: "";
        position: absolute;
        inset: -2px;
        border-radius: 18px;
        pointer-events: none;
        box-shadow:
          0 0 0 1px rgba(0, 255, 156, 0.08),
          0 0 50px rgba(0, 255, 156, 0.08);
      }

      h1 {
        margin: 0 0 10px;
        font-size: clamp(38px, 6vw, 64px);
        font-weight: 900;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--neon);
        text-shadow: 0 0 34px rgba(0, 255, 156, 0.22);
      }

      p {
        margin: 0 0 26px;
        font-size: clamp(14px, 2.2vw, 18px);
        color: var(--muted);
        line-height: 1.6;
      }

      /* Interactive hover animation (ported from the React demo) */
      .playBtn {
        --btnH: 56px;
        --btnW: 220px;
        --dur: 300ms;
        --ease: cubic-bezier(0.2, 0.8, 0.2, 1);

        appearance: none;
        font-family: var(--font);
        width: var(--btnW);
        height: var(--btnH);
        cursor: pointer;
        border-radius: 999px;
        border: 1px solid rgba(0, 255, 156, 0.55);
        background: rgba(2, 10, 14, 0.6);
        color: rgba(217, 255, 233, 0.95);
        padding: 10px 14px;
        position: relative;
        overflow: hidden;
        text-align: center;
        font-weight: 900;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        transition:
          transform 0.1s ease-out,
          border-color var(--dur) var(--ease),
          box-shadow var(--dur) var(--ease),
          background var(--dur) var(--ease);
        box-shadow:
          0 0 0 1px rgba(0, 255, 156, 0.12),
          0 18px 46px rgba(0, 0, 0, 0.75);
      }

      .playBtn:hover {
        transform: translateY(-1px);
        border-color: rgba(0, 255, 156, 0.85);
        box-shadow:
          0 0 22px rgba(0, 255, 156, 0.18),
          0 0 0 1px rgba(0, 255, 156, 0.16),
          0 22px 58px rgba(0, 0, 0, 0.85);
      }

      .playBtn:active {
        transform: translateY(0);
      }

      .playBtn:focus-visible {
        outline: 2px solid rgba(123, 247, 255, 0.9);
        outline-offset: 4px;
      }

      .playBtn__textOut {
        display: inline-block;
        transform: translateX(4px);
        transition: transform var(--dur) var(--ease), opacity var(--dur) var(--ease);
        position: relative;
        z-index: 2;
        color: rgba(0, 255, 156, 0.98);
      }

      .playBtn:hover .playBtn__textOut {
        transform: translateX(48px);
        opacity: 0;
      }

      .playBtn__textIn {
        position: absolute;
        inset: 0;
        z-index: 3;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        transform: translateX(48px);
        opacity: 0;
        transition: transform var(--dur) var(--ease), opacity var(--dur) var(--ease);
        color: rgba(3, 8, 14, 0.98);
        filter: drop-shadow(0 6px 18px rgba(0, 0, 0, 0.55));
      }

      .playBtn:hover .playBtn__textIn {
        transform: translateX(-4px);
        opacity: 1;
      }

      .playBtn__fill {
        position: absolute;
        left: 20%;
        top: 40%;
        width: 10px;
        height: 10px;
        border-radius: 10px;
        background: var(--neon);
        z-index: 1;
        transform: scale(1);
        transition: all var(--dur) var(--ease);
      }

      .playBtn:hover .playBtn__fill {
        left: 0%;
        top: 0%;
        width: 100%;
        height: 100%;
        transform: scale(1.8);
      }

      .playBtn__arrow {
        width: 18px;
        height: 18px;
      }

      .subtle {
        margin-top: 16px;
        font-size: 12px;
        color: rgba(217, 255, 233, 0.55);
        letter-spacing: 0.06em;
      }
    </style>
  </head>

  <body>
    <div class="scanlines" aria-hidden="true"></div>

    <main class="wrap">
      <section class="panel" aria-label="Homepage">
        <h1>Human Hacking</h1>
        <p>Interactive Cybersecurity Awareness Training</p>
        <button id="playBtn" class="playBtn" type="button" aria-label="Play">
          <span class="playBtn__textOut">PLAY</span>
          <span class="playBtn__textIn">
            <span>PLAY</span>
            <svg
              class="playBtn__arrow"
              viewBox="0 0 24 24"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
              aria-hidden="true"
            >
              <path
                d="M5 12h12"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
              />
              <path
                d="M13 6l6 6-6 6"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </span>
          <span class="playBtn__fill" aria-hidden="true"></span>
        </button>
        <div class="subtle">Tip: Use headphones for the full experience.</div>
      </section>
    </main>

    <script>
      document.getElementById("playBtn").onclick = () => {
        window.location.href = "menu.html";
      };
    </script>
  </body>
</html>
